<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin Cheong | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            background: linear-gradient(135deg, #0b1120, #111827, #1e293b);
            color: #f8fafc;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
        }

        nav {
            position: sticky;
            top: 0;
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.75);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            padding: 18px 0;
        }

        .logo { color: #38bdf8; font-weight: 800; }

        header {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
        }

        .hero-card img {
            width: 190px;
            height: 190px;
            border-radius: 50%;
        }

        section { padding: 80px 0; }

        .contact-box {
            background: rgba(255,255,255,0.06);
            padding: 30px;
            border-radius: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        input, textarea {
            padding: 14px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.85);
            color: white;
        }

        button {
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            font-weight: bold;
            cursor: pointer;
        }

        /* 🔥 NEW: Message styling */
        #messageList {
            margin-top: 20px;
        }

        #messageList div {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        #messageList strong {
            color: #38bdf8;
        }

    </style>
</head>
<body>

<nav>
    <div class="container nav-content">
        <div class="logo">Justin Cheong</div>
    </div>
</nav>

<header>
    <div class="container hero">
        <div>
            <h1>Hi, I'm <span style="color:#38bdf8;">Justin Cheong</span></h1>
            <p>BCA student, web developer & music producer.</p>
        </div>

        <div class="hero-card">
            <img src="profile.jpg">
        </div>
    </div>
</header>

<section id="contact">
    <div class="container">
        <h2>Contact Me</h2>

        <div class="contact-box">

            <!-- ✅ UPDATED FORM -->
            <form id="contactForm">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                <textarea id="message" name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>

            <!-- ✅ LIVE MESSAGES -->
            <h2 style="margin-top:30px;">Messages</h2>
            <div id="messageList"></div>

        </div>
    </div>
</section>

<footer style="text-align:center; padding:20px;">
    © 2025 Justin Cheong
</footer>

<!-- ✅ CONNECT FRONTEND TO BACKEND -->
<script src="script.js"></script>

</body>
</html>
