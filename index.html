<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin Cheong | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, #0b1120, #111827, #1e293b);
            color: #f8fafc;
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.75);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: #38bdf8;
        }

        .nav-links a {
            margin-left: 22px;
            color: #cbd5e1;
            font-weight: 600;
        }

        header {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
            padding: 60px 0;
        }

        .hero-card img {
            width: 190px;
            height: 190px;
            border-radius: 50%;
        }

        section {
            padding: 80px 0;
        }

        .contact-box {
            background: rgba(255,255,255,0.06);
            padding: 30px;
            border-radius: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        input, textarea {
            padding: 14px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.85);
            color: white;
        }

        button {
            padding: 14px;
            border-radius: 12px;
            background: #38bdf8;
            font-weight: bold;
        }

        #messageList div {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #38bdf8;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<nav>
    <div class="container nav-content">
        <div class="logo">Justin Cheong</div>
        <div class="nav-links">
            <a href="#contact">Contact</a>
        </div>
    </div>
</nav>

<section id="contact">
    <div class="container">
        <h2>Contact Me</h2>

        <div class="contact-box">
            <!-- ✅ UPDATED FORM -->
            <form id="contactForm">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                <textarea id="message" name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>

            <!-- ✅ ADDED MESSAGE DISPLAY -->
            <h2 style="margin-top:30px;">Messages</h2>
            <div id="messageList"></div>
        </div>
    </div>
</section>

<footer>
    © 2025 Justin Cheong
</footer>

<!-- ✅ LINKED SCRIPT -->
<script src="script.js"></script>

</body>
</html>
